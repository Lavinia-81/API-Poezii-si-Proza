<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Poems and Prose - API - Romanian Classical Literature</title>

    <!-- Font elegant -->
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">

    <!-- Redoc script -->
    <script src="https://cdn.redoc.ly/redoc/latest/bundles/redoc.standalone.js"></script>

    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: 'Merriweather', serif;
        background-color: #faf7f2;
      }

      /* Header premium */
      .top-header {
        background-color: #6a1b1a; /* burgundy */
        color: #fff;
        padding: 20px 40px;
        font-size: 26px;
        font-weight: 700;
        letter-spacing: 0.5px;
        display: flex;
        align-items: center;
        gap: 15px;
      }

      /* Animație subtilă pentru logo */
      @keyframes pulse {
        0%   { transform: scale(1);   opacity: 0.95; }
        50%  { transform: scale(1.06); opacity: 1; }
        100% { transform: scale(1);   opacity: 0.95; }
      }

      /* Container Redoc */
      #redoc-container {
        padding: 0;
      }
    </style>
  </head>

  <body>
    <div class="top-header">
      <img src="pana.jpg" alt="Pana de scris"
          style="width: 45px; height: 45px;
                  border-radius: 8px;
                  margin-right: 14px;
                  animation: pulse 3s ease-in-out infinite;
                  box-shadow: 0 0 6px rgba(212,175,55,0.4);" />

      Poems and Prose – API – Romanian Classical Literature
    </div>

    <!-- Redoc -->
    <div id="redoc-container"></div>

    <script>
      Redoc.init("../openapi.yaml", {
        theme: {
          colors: {
            primary: {
              main: "#6a1b1a"   /* burgundy */
            },
            text: {
              primary: "#2b2b2b",
              secondary: "#5a5a5a"
            },
            http: {
              get: "#4caf50",
              post: "#1976d2",
              put: "#ffa000",
              delete: "#d32f2f"
            }
          },
          typography: {
            fontFamily: "Merriweather, serif",
            fontSize: "16px",
            headings: {
              fontFamily: "Merriweather, serif",
              fontWeight: "700"
            }
          },
          sidebar: {
            backgroundColor: "#f3ede6"
          }
        }
      }, document.getElementById("redoc-container"));
    </script>
  </body>
</html>
